name: Renew VPN Subscription

on:
  repository_dispatch:
    types: [renew-trigger]
  workflow_dispatch:

permissions: write-all

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: pip install requests pyyaml

    - name: Get and update subscription
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
      run: |
        python3 vpn_refresher.py

    - name: Chain next run in 25 minutes
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Waiting 25 minutes before triggering next renewal..."
        sleep 1500
        echo "Triggering next renewal..."
        gh api repos/${{ github.repository }}/actions/workflows/renew.yml/dispatches \
          -f ref=main
        echo "Next renewal triggered!"
