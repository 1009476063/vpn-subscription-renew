name: Renew VPN Subscription

on:
  schedule:
    - cron: '0 */20 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Get and update subscription
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GIST_ID: 8145b94a0e627b983d10e1d42c96996f
      run: |
        # Generate device key
        DEVICE_KEY="$(( RANDOM % (99999999 - 10000000 + 1) + 10000000 ))-f3ca-4bdf-9192-f5c452a2c923"
        
        # Fetch subscription URL
        RESPONSE=$(curl -s -X POST "https://api.kuaimiaov4.com/appV4api/manusAi/applyLogin" \
          -H "user-agent: Dart/3.12 (dart:io)" \
          -H "content-type: application/json" \
          -H "accept-encoding: gzip" \
          -d "{\"deviceKey\": \"$DEVICE_KEY\"}")
        
        echo "API Response: $RESPONSE"
        
        # Parse ymlUrl
        YML_URL=$(echo "$RESPONSE" | jq -r '.data.ymlUrl // empty')
        
        if [ -z "$YML_URL" ]; then
          echo "Error: Failed to get subscription URL"
          exit 1
        fi
        
        echo "Got subscription URL: $YML_URL"
        
        # Fetch actual subscription content
        SUB_CONTENT=$(curl -s -L "$YML_URL")
        
        if [ -z "$SUB_CONTENT" ]; then
          echo "Error: Failed to fetch subscription content"
          exit 1
        fi
        
        echo "Got subscription content (first 100 chars): ${SUB_CONTENT:0:100}"
        
        # Delete old gist and create new one
        gh gist delete "$GIST_ID" --yes 2>/dev/null || true
        
        # Create new gist with subscription content
        NEW_GIST_URL=$(echo "$SUB_CONTENT" | gh gist create --public --filename "vpn_subs_kuaimao.txt")
        
        echo "New gist created: $NEW_GIST_URL"
        echo "✓ Gist updated successfully"
